<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DOMS</title>
    <script type="text/javascript">
      function addPerson() {
        let fname = document.getElementById("txtName").value;
        let lname = document.getElementById("txtName2").value;

        let person = document.createElement("tr");
        let fnCell = document.createElement("td");
        let fnNode = document.createTextNode(fname);
        fnCell.appendChild(fnNode);
        // fnCell.innerHTML = fname;
        let lnCell = document.createElement("td");
        let lnNode = document.createTextNode(lname);
        // delete button
        let deleteLink = document.createElement("a");
        deleteLink.innerHTML = "Delete";
        deleteLink.href = "#";
        deleteLink.onclick = function (){
          delperson(event)
        }
        // edit button
        let editLink = document.createElement("a");
        editLink.innerHTML = "Edit";
        editLink.href = "#";
        // space
        let sep = document.createTextNode(" | ");
        // append all
        let opCell = document.createElement("td");
        opCell.appendChild(deleteLink);
        opCell.appendChild(sep);
        opCell.appendChild(editLink);
        lnCell.appendChild(lnNode);
        person.appendChild(fnCell);
        person.appendChild(lnCell);
        person.appendChild(opCell);

        document.getElementById("tbPersons").appendChild(person);
      }

      function delperson(e){
        let person = e.srcElement.parentNode.parentNode
        document.getElementById('tbPersons').removeChild(person)

      }
    </script>
  </head>
  <body>
    <div>First Name <input type="text" id="txtName" /></div>
    <div>Last Name <input type="text" id="txtName2" /></div>
    <button onclick="addPerson()">save</button>
    <hr />
    <table id="tbPersons" align="center" border="1" width="300">
      <tr>
        <th>First Name</th>
        <th>Last Name</th>
        <th>Operations</th>
      </tr>
    </table>
  </body>
</html>
