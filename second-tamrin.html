<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <script type="text/javascript">
      function fucktorial() {
        let m = document.getElementById("txtNum1").value;
        let f = 1;
        // for (i = m; i > 1; --i) {
        //   f *= i;
        // }
        for (let i = 2; i <= m; ++i) {
          f *= i;
        }
        alert(f);
      }
      // تابع بازگشتی
      function recFactorial(k) {
        if (k == 0 || k == 1) return 1;
        else return k * recFactorial(k - 1);
      }
    </script>
  </head>
  <body>
    <input type="text" name="textbox" id="txtNum1" />
    <button onclick="fucktorial()">Fact</button>
  </body>
