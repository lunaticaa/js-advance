<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>شی window</title>
    <script type="text/javascript">
      // window.document.getElementById()
      // width and hight of screen
      // alert(window.innerWidth)
      // document.documentElement.clientHeight
      function btnOpen_click() {
        window.open("http://www.abdollahi.us", "", "_blank");
      }

      setInterval(function () {
        timer();
      }, 1000);

      function timer() {
        let time = new Date();
        document.getElementById("timer").innerHTML = time.toLocaleTimeString();
      }

      // setInterval(function() {alert("helppppp")} ,3000 )
    </script>
  </head>
  <body>
    <input type="button" value="Open Window" onclick="btnOpen_click()" />

    <br />
    <span style="background-color: yellow; color: blue" id="timer"></span>
  </body>
</html>
