<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>شی window</title>
    <script type="text/javascript">
      // window.document.getElementById()
      // width and hight of screen
      // alert(window.innerWidth)
      // document.documentElement.clientHeight
      function btnOpen_click() {
        window.open("http://www.abdollahi.us", "", "_blank");
      }

      const Timer = setInterval(function () {
        timer();
      }, 1000);

      let timerState = true;

      function timer() {
        let time = new Date();
        document.getElementById("timer").innerHTML = time.toLocaleTimeString();
      }

      function toggleTimer(btn) {
        if (timerState) {
          clearInterval(Timer);
          btn.value = "play";
          timerState = false;
        } else {
          setInterval(function () {
            timer();
          }, 1000);
          btn.value = "pause";
          timerState = true;
        }
      }

      // setInterval(function() {alert("helppppp")} ,3000 )

      setTimeout(function () {
        alert("sjnvsklbnsflkbsfb");
      }, 3000);
    </script>
  </head>
  <body>
    <input type="button" value="Open Window" onclick="btnOpen_click()" />

    <br />
    <span style="background-color: yellow; color: blue" id="timer"></span>
    <input type="button" value="pause" onclick="toggleTimer(this)" />
  </body>
</html>
