<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DOMS</title>
    <script type="text/javascript">
      function addNewLink() {
        const newLink = document.createElement("a");

        // method 1
        let linkText = document.createTextNode("Link 3");
        newLink.appendChild(linkText);

        // method 2
        newLink.innerHTML = "Link 3";
        newLink.href = "#";
        newLink.onclick = function () {
          alert("new link 3");
        };
        document.getElementById("D2").appendChild(newLink);
        let target = document.getElementById("D2").getElementsByTagName("a")[0];
        // document.getElementById("D2").insertBefore(newLink, target);
        // document.getElementById("D2").replaceChild(newLink, target);
      }

      function RemoveLink() {
        let parent = document.getElementById("D2");
        let child = document.getElementById("D2").getElementsByTagName("a")[0];

        parent.removeChild(child);
      }
    </script>
  </head>
  <body>
    <input type="button" value="Add link" onclick="addNewLink()" />
    <input type="button" value="Remove link" onclick="RemoveLink()" />
    <div id="D2">
      <a href="#">link1</a>
      <a href="#">link2</a>
    </div>
  </body>
</html>
