  <!-- in body we use: onload="printNumbers2(eval(prompt('min : ')) , eval(prompt('max : ')))" -->
  <body>
    <script type="text/javascript">
      function printNumbers(min, max) {
        for (let i = min; i <= max; i += 2) document.write(i + "<br />");
      }

      function printNumbers2(min, max) {
        let i = min;
        while (i <= max) {
          document.write(i + "<br />");
          i += 2;
        }
      }

      function f1() {
        let input = prompt("Enter a Number (* for finish): ");
        let sum = 0;
        while (input != "*") {
          sum += eval(input);
          input = prompt("Enter a Number (* for finish): ");
        }
        alert(sum);
      }
      // f1()

      function f2() {
        let i = 10;
        do {
          alert(i);
          i += 1;
        } while (i < 3);
      }
      f2();
      let names = ["ali", "hassan", "hossein"];
      function mySearch(name) {
        for (i = 0; i < names.length; ++i) {
          if (names[i] == name) {
            continue;
          } else alert(names[i]);
        }
      }

      // mySearch("hassan");

      function myObject() {
        let text = "";
        let person = { fname: "ali", lname: "kooni", age: 24 };
        for (i in person) {
          text += person[i];

          alert(text);
        }
      }

      myObject();
